# pytest.ini
[pytest]
minversion = 7.0

addopts =
    --disable-warnings
    ; --cov=.
    --cov-branch
    --cov-report=html
    --cov-report=term-missing
    --import-mode=importlib
    # Parallel execution: use -n auto to auto-detect CPU count, or -n 4 for fixed workers
    # Use --dist=loadscope to group tests by module/class (better for shared resources)
    # -n auto # Note: run_all_tests_and_coverage.sh passes this explicitly
    --dist=loadscope

norecursedirs =
    .*
    __pycache__
    htmlcov

pythonpath = "."
python_files = test_*.py

testpaths = src/tests

# Markers for test organization
markers =
    serial: Tests that must run sequentially (use shared resources like files, global state)
    integration: Integration tests that may take longer
    file_io: Tests that perform file I/O operations on shared paths
    sample_1_mobile_camera: Sample path marker for 1-mobile-camera test
    sample_2_omr_marker: Sample path marker for 2-omr-marker test
    sample_3_answer_key_bonus_marking: Sample path marker for 3-answer-key-bonus-marking test
    sample_3_answer_key_bonus_marking_grouping: Sample path marker for 3-answer-key-bonus-marking-grouping test
    sample_3_answer_key_using_csv: Sample path marker for 3-answer-key-using-csv test
    sample_3_answer_key_using_image: Sample path marker for 3-answer-key-using-image test
    sample_3_answer_key_using_image_grouping: Sample path marker for 3-answer-key-using-image-grouping test
    sample_3_answer_key_weighted_answers: Sample path marker for 3-answer-key-weighted-answers test
    sample_experimental_1_timelines_and_dots_four_dots: Sample path marker for experimental timelines and dots (four dots) test
    sample_experimental_1_timelines_and_dots_two_lines: Sample path marker for experimental timelines and dots (two lines) test
    sample_experimental_2_template_shifts: Sample path marker for experimental template shifts test
    sample_experimental_3_feature_based_alignment: Sample path marker for experimental feature-based alignment test
    sample_community_Antibodyy: Sample path marker for community Antibodyy test
    sample_community_ibrahimkilic: Sample path marker for community ibrahimkilic test
    sample_community_Sandeep_1507: Sample path marker for community Sandeep_1507 test
    sample_community_Shamanth: Sample path marker for community Shamanth test
    sample_community_UmarFarootAPS: Sample path marker for community UmarFarootAPS test
    sample_community_JoyChopra1298: Sample path marker for community JoyChopra1298 test
