# Ruff configuration for OMRChecker
extend-exclude = ["change-propagation-tool", "omrchecker-js", ".venv", "venv"]

[lint]
ignore = [
    "D212",    # Multi-line docstring summary (formatting preference)
    "D415",    # First line punctuation (formatting preference)
    "C901",    # Function complexity (acceptable for domain logic)
    "PLR0912", # Too many branches (acceptable for domain logic)
    "PERF401", # List comprehension (readability over micro-optimization)
    "PTH123",  # Path.open() (open() is clearer for small scripts)
    "S607",    # Partial executable path (git/pnpm are in PATH)
    "S603",    # subprocess execution (we control all inputs)
    "S108",    # Insecure temp file (acceptable for dev tooling)
    "ARG001",  # Unused function arg (interface requirements)
    "ARG002",  # Unused method arg (interface requirements)
    "PLW2901", # Loop variable overwritten (intentional)
    "TRY300",  # Move to else block (readability preference)
    "E722",    # Bare except (acceptable in error recovery)
    "UP017",   # datetime.UTC (Python 3.11 compatibility)
]
